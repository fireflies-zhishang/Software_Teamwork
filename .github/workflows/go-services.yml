name: Go Services

on:
  pull_request:
    branches: [develop]
    paths:
      - 'services/**'
      - '.github/workflows/go-services.yml'
  push:
    branches: [develop]
    paths:
      - 'services/**'
      - '.github/workflows/go-services.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
      has-services: ${{ steps.changed.outputs.has-services }}
      knowledge-integration: ${{ steps.changed.outputs.knowledge-integration }}
    steps:
      - name: Detect changed services
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const knownServices = [
              'ai-gateway',
              'auth',
              'document',
              'file',
              'gateway',
              'knowledge',
              'qa',
            ];
            const workflowPath = '.github/workflows/go-services.yml';

            const changedFiles = new Set();
            const addChangedFile = (file) => {
              if (file.filename) {
                changedFiles.add(file.filename);
              }
              if (file.previous_filename) {
                changedFiles.add(file.previous_filename);
              }
            };

            if (context.eventName === 'pull_request') {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              for (const file of files) {
                addChangedFile(file);
              }
            } else if (context.eventName === 'push') {
              const response = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${context.payload.before}...${context.payload.after}`,
              });
              for (const file of response.data.files || []) {
                addChangedFile(file);
              }
            }

            const files = [...changedFiles];
            const workflowChanged = files.includes(workflowPath);
            const changedServices = new Set();

            if (workflowChanged) {
              for (const service of knownServices) {
                changedServices.add(service);
              }
            } else {
              for (const file of files) {
                const match = file.match(/^services\/([^/]+)\//u);
                if (match && knownServices.includes(match[1])) {
                  changedServices.add(match[1]);
                }
              }
            }

            const services = [...changedServices].sort((a, b) =>
              knownServices.indexOf(a) - knownServices.indexOf(b)
            );
            const knowledgeIntegration =
              workflowChanged || services.includes('knowledge');

            core.info(`Changed files: ${files.join(', ') || '(none)'}`);
            core.info(`Selected services: ${services.join(', ') || '(none)'}`);
            core.setOutput('services', JSON.stringify(services));
            core.setOutput('has-services', services.length > 0 ? 'true' : 'false');
            core.setOutput(
              'knowledge-integration',
              knowledgeIntegration ? 'true' : 'false'
            );

  service:
    needs: detect
    if: needs.detect.outputs.has-services == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect.outputs.services) }}
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: services/${{ matrix.service }}/go.mod

      - name: Test
        run: go test ./...

      - name: Build server
        run: go build ./cmd/server

      - name: Build QA agent
        if: matrix.service == 'qa'
        run: go build ./cmd/agent

  knowledge-repository-integration:
    needs: detect
    if: needs.detect.outputs.knowledge-integration == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: services/knowledge
    env:
      KNOWLEDGE_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: services/knowledge/go.mod

      - name: Test repository lifecycle
        run: go test ./internal/repository -count=1
