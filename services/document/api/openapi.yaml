openapi: 3.1.0
info:
  title: Document Service API
  version: 0.1.0
  description: Internal operational and report job contract for the document service baseline.
servers:
  - url: http://localhost:8085
tags:
  - name: operations
  - name: report-jobs
paths:
  /healthz:
    get:
      tags:
        - operations
      operationId: getDocumentHealth
      summary: Check document service liveness
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
  /readyz:
    get:
      tags:
        - operations
      operationId: getDocumentReadiness
      summary: Check document service readiness
      responses:
        "200":
          description: Service dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthEnvelope"
        "502":
          $ref: "#/components/responses/Error"
  /reports/{reportId}/jobs:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags:
        - report-jobs
      operationId: listDocumentReportJobs
      summary: List report jobs
      responses:
        "200":
          description: Report jobs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJobListEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - report-jobs
      operationId: createDocumentReportJob
      summary: Create report job
      description: Creates long-running report work and enqueues a document asynq task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportJobRequest"
      responses:
        "202":
          description: Report job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJobEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
  /report-jobs/{jobId}:
    parameters:
      - $ref: "#/components/parameters/JobId"
    get:
      tags:
        - report-jobs
      operationId: getDocumentReportJob
      summary: Get report job
      responses:
        "200":
          description: Report job.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJobEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /report-jobs/{jobId}/attempts:
    parameters:
      - $ref: "#/components/parameters/JobId"
    get:
      tags:
        - report-jobs
      operationId: listDocumentReportJobAttempts
      summary: List report job attempts
      responses:
        "200":
          description: Report job attempts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJobAttemptListEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    post:
      tags:
        - report-jobs
      operationId: createDocumentReportJobAttempt
      summary: Create report job attempt
      description: Creates a manual retry attempt for an existing failed or canceled report job.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportJobAttemptRequest"
      responses:
        "202":
          description: Report job attempt accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportJobAttemptEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
  /reports/{reportId}/events:
    parameters:
      - $ref: "#/components/parameters/ReportId"
    get:
      tags:
        - report-jobs
      operationId: listDocumentReportEvents
      summary: List report events
      description: Returns sanitized report workflow events for polling and audit.
      responses:
        "200":
          description: Report events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportEventListEnvelope"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "403":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Standard error envelope.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthEnvelope:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          type: object
          required:
            - service
            - status
          properties:
            service:
              type: string
              enum:
                - document
            status:
              type: string
              enum:
                - ok
                - ready
        requestId:
          type: string
    ReportJobType:
      type: string
      enum:
        - outline_generation
        - outline_regeneration
        - content_generation
        - content_regeneration
        - section_regeneration
        - report_file_creation
    ReportJobStatus:
      type: string
      enum:
        - pending
        - running
        - succeeded
        - partial_succeeded
        - failed
        - canceled
    CreateReportJobRequest:
      type: object
      required:
        - jobType
      properties:
        jobType:
          $ref: "#/components/schemas/ReportJobType"
        target:
          type: object
          description: Generation target. Current implementation supports report-level jobs and section-level regeneration.
          properties:
            scope:
              type: string
              enum:
                - report
                - section
              description: Implemented target scopes for job creation. Use section with sectionId for section_regeneration; omit or use report for report-level jobs.
            sectionId:
              type: string
              format: uuid
              description: Required when jobType is section_regeneration.
        requirements:
          type: string
          description: Additional generation requirements supplied by the caller.
        materialIds:
          type: array
          description: Document-owned report material IDs referenced by the generation request.
          items:
            type: string
            format: uuid
        options:
          type: object
          description: Generation options. knowledgeBaseIds, topK, scoreThreshold, rerank, and rerankTopN trigger optional Knowledge retrieval when the Document service is configured with a Knowledge service URL.
          additionalProperties: true
        retrieval:
          type: object
          description: Service-local alias for retrieval options; gateway clients should prefer options unless the gateway contract adds this field.
          additionalProperties: true
    CreateReportJobAttemptRequest:
      type: object
      properties:
        reason:
          type: string
    ReportJobError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    ReportJob:
      type: object
      required:
        - id
        - jobType
        - status
        - reportId
        - attemptCount
        - maxAttempts
        - progress
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        jobType:
          $ref: "#/components/schemas/ReportJobType"
        status:
          $ref: "#/components/schemas/ReportJobStatus"
        reportId:
          type: string
          format: uuid
        attemptCount:
          type: integer
          minimum: 1
        maxAttempts:
          type: integer
          minimum: 1
        progress:
          type: object
          additionalProperties: true
        error:
          $ref: "#/components/schemas/ReportJobError"
        errorCode:
          type: string
        errorMessage:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    ReportJobAttempt:
      type: object
      required:
        - id
        - jobId
        - attemptNumber
        - triggerSource
        - status
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        attemptNumber:
          type: integer
          minimum: 1
        triggerSource:
          type: string
        status:
          $ref: "#/components/schemas/ReportJobStatus"
        error:
          $ref: "#/components/schemas/ReportJobError"
        errorCode:
          type: string
        errorMessage:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    ReportEvent:
      type: object
      required:
        - id
        - reportId
        - eventType
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        reportId:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        eventType:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
    ReportJobEnvelope:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          $ref: "#/components/schemas/ReportJob"
        requestId:
          type: string
    ReportJobListEnvelope:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReportJob"
        requestId:
          type: string
    ReportJobAttemptEnvelope:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          $ref: "#/components/schemas/ReportJobAttempt"
        requestId:
          type: string
    ReportJobAttemptListEnvelope:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReportJobAttempt"
        requestId:
          type: string
    ReportEventListEnvelope:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ReportEvent"
        requestId:
          type: string
    ErrorEnvelope:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
            - requestId
          properties:
            code:
              type: string
              enum:
                - validation_error
                - unauthorized
                - forbidden
                - not_found
                - conflict
                - rate_limited
                - dependency_error
                - internal_error
                - not_implemented
            message:
              type: string
            requestId:
              type: string
            fields:
              type: object
              additionalProperties:
                type: string
